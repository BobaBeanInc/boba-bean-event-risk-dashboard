name: Update Event Risk Data

on:
  schedule:
    - cron: "7 13 * * *"   # 9 AM Eastern
    - cron: "7 19 * * *"   # 3 PM Eastern
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run event scan
        run: npm run scan

      - name: Validate output
        run: npm run validate

      - name: Commit updated events.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/events.json
          if git diff --staged --quiet; then
            echo "No changes to events.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: update event risk data"
          # Retry on race: pull --rebase then push, up to 3 attempts.
          # Handles the case where another commit landed on main while
          # this workflow was running.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected — pulling latest main and retrying..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts. Manual intervention required."
          exit 1
